AWSTemplateFormatVersion: '2010-09-09'

# ╔════════════════════════════════════════════════════════════════════════╗
# ║  snowtuner — single-instance Snowflake cost optimizer                  ║
# ╠════════════════════════════════════════════════════════════════════════╣
# ║  Provisions:                                                           ║
# ║    • IAM role + instance profile (SSM Session Manager + Secrets read)  ║
# ║    • Security group (no inbound rules — access via SSM only)           ║
# ║    • EC2 instance (AL2023, default t3.small, 30GB root volume)         ║
# ║                                                                        ║
# ║  Prereq (NOT in this stack — you create it once before launching):     ║
# ║    • Secrets Manager secret containing your Snowflake creds JSON       ║
# ║                                                                        ║
# ║  Cost: ~$18/month  (t3.small + 30GB gp3 + Secrets Manager)             ║
# ╚════════════════════════════════════════════════════════════════════════╝

Description: snowtuner — open-source Snowflake cost & performance advisor

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: {default: "Snowflake credentials"}
        Parameters: [SnowflakeSecretArn]
      - Label: {default: "Compute"}
        Parameters: [InstanceType, VolumeSize, VpcId, SubnetId]
      - Label: {default: "Source (advanced — usually leave alone)"}
        Parameters: [RepoUrl, RepoRef]
    ParameterLabels:
      SnowflakeSecretArn: {default: "Snowflake credentials secret ARN"}
      InstanceType:       {default: "EC2 instance type"}
      VolumeSize:         {default: "Root volume size (GB)"}
      VpcId:              {default: "VPC"}
      SubnetId:           {default: "Subnet"}
      RepoUrl:            {default: "snowtuner repo URL"}
      RepoRef:            {default: "Branch / tag / commit"}

Parameters:
  SnowflakeSecretArn:
    Type: String
    AllowedPattern: '^arn:aws:secretsmanager:[a-z0-9-]+:\d{12}:secret:.+$'
    ConstraintDescription: Must be a Secrets Manager ARN (arn:aws:secretsmanager:REGION:ACCOUNT:secret:NAME-XXXXX).
    Description: >
      ARN of your pre-created Secrets Manager secret holding the Snowflake
      creds JSON.

  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues: [t3.small, t3.medium, t3.large, m6i.large, m6i.xlarge]
    Description: EC2 instance size. t3.small (~$15/mo) handles a few-thousand-warehouse account comfortably.

  VolumeSize:
    Type: Number
    Default: 30
    MinValue: 20
    MaxValue: 500
    Description: Root volume size in GB. Holds OS, venv, SPA build, DuckDB, audit archives.

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to launch into. Default VPC is fine.

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet in the VPC above.

  RepoUrl:
    Type: String
    Default: https://github.com/austinkjensen/snowtuner.git
    Description: snowtuner repo to clone on first boot.

  RepoRef:
    Type: String
    Default: main
    Description: Git ref (branch, tag, or commit SHA) to deploy.

Resources:

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: ec2.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: ReadSnowtunerSecret
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref SnowflakeSecretArn
      Tags:
        - Key: ManagedBy
          Value: snowtuner-cfn

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref EC2Role]

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: snowtuner - SSM only, no inbound rules
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: All outbound (Snowflake, SSM, dnf, etc.)
      Tags:
        - Key: Name
          Value: snowtuner

  EC2Instance:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M
        Count: 1
    Properties:
      # AL2023 latest, looked up dynamically — no region-specific AMI maps.
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !Ref SubnetId
      SecurityGroupIds: [!Ref SecurityGroup]
      MetadataOptions:
        # IMDSv2 required — defense against SSRF stealing IAM creds.
        HttpTokens: required
        HttpPutResponseHopLimit: 2
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: !Ref VolumeSize
            VolumeType: gp3
            Encrypted: true
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: snowtuner
        - Key: ManagedBy
          Value: snowtuner-cfn
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          exec > >(tee -a /var/log/snowtuner-userdata.log) 2>&1
          set -euo pipefail

          # cfn-signal lives in aws-cfn-bootstrap, not preinstalled on AL2023.
          dnf -y install aws-cfn-bootstrap git

          # Signal CF whatever the script's exit code — without this, a
          # bootstrap failure leaves the stack waiting the full 15-min timeout.
          trap 'rc=$?; /opt/aws/bin/cfn-signal -e $rc \
            --stack ${AWS::StackName} \
            --resource EC2Instance \
            --region ${AWS::Region}' EXIT

          # IAM role propagation can take a few seconds after instance start.
          sleep 10

          # Initial clone happens as root so bootstrap.sh (also root) can
          # `git fetch` in here on re-runs without hitting git's
          # safe.directory protection (CVE-2022-24765).  bootstrap.sh
          # `chown -R snowtuner:snowtuner` at the end of clone_repo to
          # hand the tree off to the runtime service user.
          mkdir -p /opt/snowtuner
          git clone --depth=1 --branch ${RepoRef} ${RepoUrl} /opt/snowtuner

          SNOWTUNER_SECRET_ID='${SnowflakeSecretArn}' \
          AWS_REGION='${AWS::Region}' \
            bash /opt/snowtuner/deploy/bootstrap.sh

Outputs:
  InstanceId:
    Description: EC2 instance ID — use with aws ssm commands
    Value: !Ref EC2Instance

  PortForwardCommand:
    Description: >
      Run this on your laptop to access the snowtuner UI at localhost:8770.
    Value: !Sub >
      aws ssm start-session --target ${EC2Instance}
      --document-name AWS-StartPortForwardingSession
      --parameters '{"portNumber":["8770"],"localPortNumber":["8770"]}'
      --region ${AWS::Region}

  ShellCommand:
    Description: SSM-session in to grab the API token or run snowtuner CLI commands.
    Value: !Sub aws ssm start-session --target ${EC2Instance} --region ${AWS::Region}

  ApiTokenInstructions:
    Description: From the SSM session, run this to fetch the auto-generated API token.
    Value: sudo cat /var/lib/snowtuner/api_token
